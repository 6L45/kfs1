# =============================================================================
# grub/grub.cfg - Configuration GRUB pour le noyau KFS-1
# =============================================================================
#
# CONCEPT: GRUB CONFIGURATION
#
# GRUB utilise ce fichier pour savoir quoi booter.
# Il sera copié dans /boot/grub/ de l'image ISO.
#
# COMMANDES GRUB:
#   set timeout:    Délai en secondes avant de booter l'entrée par défaut
#   set default:    Index de l'entrée à booter par défaut (0 = première)
#   menuentry:      Définir une entrée dans le menu de boot
#   multiboot:      Charger un noyau au format Multiboot
#   boot:           Démarrer le noyau chargé
#
# LE FORMAT MULTIBOOT:
# "multiboot /boot/kernel.bin" indique à GRUB de charger notre binaire
# en utilisant le protocole Multiboot (cherche l'en-tête dans les 8 premiers KB,
# charge le fichier en mémoire, prépare la structure multiboot_info, etc.)
# =============================================================================

# Délai d'affichage du menu (en secondes)
# 0 = booter immédiatement, -1 = attendre indéfiniment
set timeout=3

# Entrée par défaut (index commençant à 0)
set default=0

# Définir la résolution du terminal GRUB (mode texte)
# terminal_output console

menuentry "KFS-1 Kernel" {
    # Charger notre noyau en mode Multiboot
    # Le fichier kernel.bin est dans /boot/ de l'image ISO
    multiboot /boot/kernel.bin

    # Option: passer des arguments au noyau (accessible via multiboot_info.cmdline)
    # multiboot /boot/kernel.bin quiet debug

    # Démarrer le noyau
    boot
}

# Entrée de secours (pour débogage)
menuentry "KFS-1 Kernel (verbose)" {
    multiboot /boot/kernel.bin verbose
    boot
}
